<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Parspec Retrieval Command Center</title>
    <meta
      name="description"
      content="AI-powered product datasheet retrieval with OCR-aware ingestion, table-atomic chunking, hybrid search, explainable confidence, and evaluation dashboard."
    />

    <meta name="theme-color" content="#050816" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        color-scheme: dark;

        --bg-0: #020617;
        --bg-1: #050816;
        --bg-2: #0a1020;

        --text-main: #e5edf8;
        --text-soft: #94a3b8;
        --text-muted: #64748b;

        --blue: #2563eb;
        --cyan: #06b6d4;
        --sky: #38bdf8;
        --green: #34d399;
        --red: #fb7185;
        --amber: #fbbf24;

        --border-soft: rgba(148, 163, 184, 0.16);
        --panel: rgba(15, 23, 42, 0.68);
        --panel-strong: rgba(2, 6, 23, 0.78);

        font-family: "DM Sans", Inter, ui-sans-serif, system-ui, -apple-system,
          BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-synthesis: none;
        text-rendering: geometricPrecision;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html {
        min-height: 100%;
        background: var(--bg-1);
        scroll-behavior: smooth;
      }

      body {
        min-height: 100vh;
        overflow-x: hidden;
        background:
          radial-gradient(circle at 12% 8%, rgba(37, 99, 235, 0.26), transparent 30%),
          radial-gradient(circle at 82% 0%, rgba(6, 182, 212, 0.18), transparent 28%),
          radial-gradient(circle at 50% 110%, rgba(14, 165, 233, 0.1), transparent 36%),
          linear-gradient(135deg, #020617 0%, #050816 48%, #07111f 100%);
        color: var(--text-main);
        font-family: "DM Sans", Inter, ui-sans-serif, system-ui, -apple-system,
          BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        background-image:
          linear-gradient(rgba(148, 163, 184, 0.035) 1px, transparent 1px),
          linear-gradient(90deg, rgba(148, 163, 184, 0.035) 1px, transparent 1px);
        background-size: 44px 44px;
        mask-image: radial-gradient(circle at center, black 0%, transparent 78%);
      }

      body::after {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        background:
          linear-gradient(
            120deg,
            transparent 0%,
            rgba(56, 189, 248, 0.05) 42%,
            transparent 55%
          );
        mix-blend-mode: screen;
      }

      #root {
        position: relative;
        z-index: 1;
        min-height: 100vh;
      }

      button,
      input,
      select,
      textarea {
        font: inherit;
      }

      button {
        -webkit-tap-highlight-color: transparent;
      }

      button:disabled,
      input:disabled,
      select:disabled {
        cursor: not-allowed !important;
        opacity: 0.58;
      }

      input,
      select,
      textarea {
        color-scheme: dark;
      }

      input::placeholder,
      textarea::placeholder {
        color: #64748b;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      ::selection {
        background: rgba(56, 189, 248, 0.35);
        color: #f8fafc;
      }

      ::-webkit-scrollbar {
        width: 9px;
        height: 9px;
      }

      ::-webkit-scrollbar-track {
        background: rgba(2, 6, 23, 0.45);
      }

      ::-webkit-scrollbar-thumb {
        background: linear-gradient(180deg, #1e40af, #0891b2);
        border-radius: 999px;
        border: 2px solid rgba(2, 6, 23, 0.7);
      }

      ::-webkit-scrollbar-thumb:hover {
        background: linear-gradient(180deg, #2563eb, #06b6d4);
      }

      .mono,
      code,
      pre {
        font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Monaco,
          Consolas, "Liberation Mono", "Courier New", monospace;
      }

      @media (max-width: 900px) {
        body::before {
          background-size: 32px 32px;
        }
      }
    </style>
  </head>

  <body>
    <noscript>
      <div
        style="
          margin: 40px auto;
          max-width: 720px;
          padding: 24px;
          border-radius: 18px;
          background: rgba(15, 23, 42, 0.88);
          border: 1px solid rgba(148, 163, 184, 0.2);
          color: #e5edf8;
          font-family: DM Sans, sans-serif;
        "
      >
        JavaScript is required to run the Parspec Retrieval Command Center.
      </div>
    </noscript>

    <div id="root"></div>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
